<p class="i18n" data-en="An unconventional interactive vocabulary trainer, built by Engineer Amir for computer engineering students and enthusiasts. The player displays each term in English and Arabic, pronouncing it automatically via the Web Speech API, with full control over speech rate, repetition count, and playback order (sequential or shuffled). It covers 1,000+ terms organized into precise categories — AI & machine learning, networking, cybersecurity, computer engineering, software development, and databases." data-ar="أداة تفاعلية غير تقليدية لتعلّم المصطلحات، صممها المهندس أمير خصيصاً لطلاب هندسة الحاسوب وفروعها. يعرض المشغّل المصطلح إنجليزياً وعربياً، وينطقه صوتياً بشكل تلقائي عبر تقنية Web Speech API، مع إمكانية التحكم بسرعة النطق، تكرار كل مصطلح، واختيار الترتيب (تسلسلي أو عشوائي). يغطي أكثر من 1000 مصطلح موزعة على فئات دقيقة: الذكاء الاصطناعي وتعلم الآلة، الشبكات، الأمن السيبراني، هندسة الحاسوب، البرمجيات، وقواعد البيانات."></p>
