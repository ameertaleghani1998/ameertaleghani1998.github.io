  <h1 class="i18n"
    data-en="Why Do You Triple-Lock Your Front Door, But Leave Your Digital Door Wide Open?"
    data-ar="لماذا تقفل باب بيتك بثلاثة أقفال، وتترك بابك الرقمي مفتوحاً؟"></h1>

  <p class="lead-desc i18n"
    data-en="We practice instinctive security habits in everyday life without a second thought, then completely abandon those same instincts when it comes to our digital accounts."
    data-ar="نمارس غرائز أمان فطرية في حياتنا اليومية دون أن نفكر فيها، ثم نتجاهل هذه الغرائز نفسها تماماً حين يتعلق الأمر بحساباتنا الرقمية."></p>

  <p class="i18n"
    data-en="Picture this: you get home in the evening, lock the front door, double-check that the kitchen door is locked too, and maybe glance out the window one last time before bed. No one formally taught you these habits — you do them instinctively, because the idea of 'a stranger entering your home' feels like a real, tangible threat."
    data-ar="تخيل معي هذا المشهد: تصل إلى بيتك مساءً، تقفل الباب الرئيسي، تتأكد أن باب المطبخ مقفل أيضاً، وربما تلقي نظرة أخيرة من النافذة قبل أن تنام. لا أحد يعلّمك هذه العادات رسمياً، لكنك تمارسها بشكل غريزي، لأن فكرة 'شخص غريب يدخل بيتك' تبدو لك تهديداً حقيقياً وملموساً."></p>

  <p class="i18n"
    data-en="Now compare that to your digital life."
    data-ar="الآن قارن هذا بحياتك الرقمية."></p>

  <p class="i18n"
    data-en="How many times have you used the same password across more than one account? How many times have you clicked a link sent from an unknown number without a second thought? How many times have you connected to public Wi-Fi without wondering who else might be 'listening' on that same network?"
    data-ar="كم مرة استخدمت نفس كلمة المرور في أكثر من حساب؟ كم مرة ضغطت على رابط أرسله لك رقم لا تعرفه دون تردد؟ كم مرة وصلت بجهازك لشبكة واي فاي عامة دون أن تسأل نفسك من قد يكون 'يستمع' على نفس الشبكة؟"></p>

  <p class="i18n"
    data-en="The paradox is that the same human brain that acts with extreme caution toward a tangible threat — like an open door — treats a digital threat as if it doesn't exist, simply because it can't be seen."
    data-ar="المفارقة أن الدماغ البشري نفسه، الذي يتصرف بحذر شديد أمام تهديد ملموس كباب مفتوح، يتعامل مع التهديد الرقمي وكأنه غير موجود، فقط لأنه لا يُرى بالعين."></p>

  <p class="i18n"
    data-en="Take passwords, for example. According to a study by Forbes Advisor, 78% of people use the same password for more than one account, and over half use it for at least three accounts. Now imagine applying that same logic to the physical world: using the same key for your house, your car, your safe, and your office door. If someone stole that one key, they'd have unlocked every door you own, all at once. That's exactly what happens when one poorly secured website leaks your password — while you're using that same password for your email and your bank account too."
    data-ar="خذ مثال كلمات المرور. وفقاً لدراسة أجرتها Forbes Advisor، فإن 78% من الأشخاص يستخدمون نفس كلمة المرور لأكثر من حساب واحد، وأكثر من نصفهم يستخدمونها لثلاثة حسابات على الأقل. تخيل لو طبّقنا هذا المنطق على العالم الحقيقي: لو استخدمت نفس المفتاح لباب بيتك، وسيارتك، وخزنتك، وباب مكتبك. لو سرق أحدهم هذا المفتاح مرة واحدة، فقد فتح لك كل أبوابك دفعة واحدة. هذا بالضبط ما يحدث حين يُسرّب موقع واحد ضعيف الحماية كلمة مرورك، بينما تستخدمها في بريدك الإلكتروني وحسابك البنكي أيضاً."></p>

  <p class="i18n"
    data-en="Or take suspicious links. None of us opens the door to a stranger knocking without first asking 'who is it?' Yet many people click any link that arrives via text or email, even from an unknown sender, simply because the message seems urgent or exciting. That link is the 'unknown visitor at the door' — except we open it without hesitation."
    data-ar="أو خذ مثال الروابط المشبوهة. لا أحد منا يفتح الباب لشخص غريب يطرق دون أن يسأل 'مين؟' أولاً. لكن كثيرين يضغطون على أي رابط يصلهم برسالة نصية أو بريد إلكتروني، حتى لو كان المرسل غير معروف، لمجرد أن الرسالة تبدو عاجلة أو مثيرة. هذا الرابط هو نفسه 'الطارق المجهول'، لكننا نفتح له الباب دون تردد."></p>

  <p class="i18n"
    data-en="Even public Wi-Fi follows the same logic. Connecting to an unsecured public network is like leaving your front door wide open in a crowded public square, trusting that no one will notice or walk in."
    data-ar="حتى شبكات الواي فاي العامة تحمل نفس المنطق. الاتصال بشبكة عامة غير محمية يشبه ترك باب بيتك مفتوحاً في ساحة عامة مزدحمة، والثقة بأن لا أحد سيلاحظ أو يدخل."></p>

  <p class="i18n"
    data-en="The solution isn't complicated — it just requires transferring the same instinct we practice naturally in our physical lives into our digital ones:"
    data-ar="الحل ليس معقداً، بل يحتاج فقط أن ننقل نفس الغريزة التي نمارسها فطرياً في حياتنا المادية إلى حياتنا الرقمية:"></p>

  <p class="i18n"
    data-en="Use a different password for each important account, just as you'd use a different key for each door. Enable two-factor authentication — it's essentially an extra lock on top of your main one. Verify the sender's identity before clicking any link, just as you'd check who's knocking before opening the door. And avoid handling sensitive information on untrusted public networks."
    data-ar="استخدم كلمة مرور مختلفة لكل حساب مهم، تماماً كما تستخدم مفتاحاً مختلفاً لكل باب. فعّل خاصية المصادقة الثنائية، فهي أشبه بقفل إضافي فوق القفل الأساسي. تحقق من هوية المرسل قبل أن تضغط على أي رابط، تماماً كما تتحقق من هوية من يطرق بابك. وتجنب التعامل مع بيانات حساسة على شبكات عامة غير موثوقة."></p>

  <p class="i18n"
    data-en="At its core, digital security isn't some complex technical skill — it's the same instinct we all already have toward the doors of our homes. We just need to remember to use it in the world we can't see, but live in every single day."
    data-ar="الأمان الرقمي، في جوهره، ليس مهارة تقنية معقدة، بل هو نفس الحس الفطري الذي نملكه جميعاً تجاه أبواب بيوتنا — نحتاج فقط أن نتذكر استخدامه في العالم الذي لا نراه بأعيننا، لكننا نعيش فيه كل يوم."></p>

    data-ar='المصدر: Forbes Advisor &amp; Talker Research, "Password Security Survey", 2025.'></div>
